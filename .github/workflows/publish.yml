name: Publish to npm

# Publishes the `livearch` package when you cut a GitHub Release.
# One-time setup: add an npm access token as the repo secret NPM_TOKEN
#   (npmjs.com → Access Tokens → Granular Access Token, publish scope for `livearch`;
#    GitHub → repo Settings → Secrets and variables → Actions → New secret → NPM_TOKEN).
# Then: bump the version, tag it, and publish a Release — this workflow does the rest.

on:
  release:
    types: [published]
  workflow_dispatch: {}   # allow a manual run from the Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write     # enables npm provenance (verified build attestation)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # A release tag that disagrees with package.json publishes the wrong
      # version, or dies later on npm's "cannot publish over" error, which does
      # not name the real problem. Fail here instead, before anything ships.
      # Skipped for workflow_dispatch, which has no release tag to compare.
      - name: Verify tag matches package.json version
        if: github.event_name == 'release'
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Release tag v${tag} does not match package.json version ${pkg}. Bump package.json or retag."
            exit 1
          fi
          echo "Tag and package.json agree on ${pkg}"

      - run: npm ci
      - run: npm test

      # --provenance records how/where the package was built; --access public
      # publishes it as a public package.
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
